<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Multichain Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-box { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-[#080B11] text-white min-h-screen p-4">

    <div class="max-w-md mx-auto space-y-4">
        <!-- Header -->
        <div class="flex items-center justify-between bg-[#111622] p-4 rounded-xl border border-[#1f2636]">
            <div class="flex items-center gap-3">
                <div class="logo-box">
                    <img src="1000227687.jpg" alt="Arc Logo" class="logo-img">
                </div>
                <h1 class="text-xs font-bold text-blue-400 uppercase tracking-wider">ARC MULTICHAIN AGENT</h1>
            </div>
            <button class="text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/40 px-3 py-1 rounded-full">Connect</button>
        </div>

        <!-- Wallet Session -->
        <div class="bg-[#111622] p-5 rounded-2xl border border-[#1f2636]">
            <h2 class="text-sm font-semibold mb-4">📊 Wallet Session</h2>
            <div class="space-y-3 text-xs text-gray-400">
                <p>Address: <span class="text-white break-all">0xef084f79208db9d282df5470640de93196dc52de</span></p>
                <div class="flex justify-between">
                    <p>Chain: <span class="text-cyan-400">0x66eee</span></p>
                    <p>Balance: <span class="text-emerald-400">0.00 USDC</span></p>
                </div>
            </div>
        </div>

        <!-- Talk to Agent -->
        <div class="bg-[#111622] p-5 rounded-2xl border border-[#1f2636]">
            <h2 class="text-sm font-semibold mb-2">Talk to Agent</h2>
            <div class="bg-[#080B11] p-3 rounded-xl border border-[#2d374f] h-32 mb-2 text-xs text-gray-500">
                Agent: Network ready. Send 1 USDC to 0x...
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Send 1 USDC..." class="flex-1 bg-[#080B11] border border-[#2d374f] rounded-xl px-3 py-2 text-xs outline-none focus:border-blue-500">
                <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold text-white">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
