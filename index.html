<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Multichain Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
</head>
<body class="min-h-screen bg-[#080B11] text-white font-sans p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-4 my-6">
        
        <div class="flex justify-between items-center bg-[#111622]/40 p-4 border border-[#1f2636] rounded-xl shadow-md">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 rounded-lg overflow-hidden flex items-center justify-center bg-[#0d121f]">
                    <img src="https://raw.githubusercontent.com/YourUsername/YourRepo/main/1000227687.jpg" alt="Logo" class="h-full w-full object-cover" onerror="this.src='https://via.placeholder.com/32'">
                </div>
                <h1 class="text-sm font-bold tracking-wider text-blue-400 uppercase">ARC MULTICHAIN AGENT</h1>
            </div>
            <button id="connectBtn" class="text-xs bg-emerald-500/10 border border-emerald-500/40 text-emerald-400 px-3 py-1.5 rounded-full font-mono">🔌 Connect</button>
        </div>

        <div class="bg-[#111622] border border-[#1f2636] rounded-2xl p-5 shadow-xl space-y-4">
            <div class="flex justify-between items-center border-b border-[#1f2636] pb-3">
                <h2 class="text-sm font-semibold text-gray-200">📊 Wallet Session</h2>
                <select id="networkSwitcher" class="bg-[#080B11] text-[10px] border border-[#2d374f] rounded-lg px-2 py-1 text-cyan-400 font-mono cursor-pointer">
                    <option value="0x4cf0d2">Arc Testnet</option>
                    <option value="0xaa36a7">Sepolia</option>
                    <option value="0x66eee">Arbitrum Sepolia</option>
                    <option value="0x14a33">Base Sepolia</option>
                </select>
            </div>
            
            <div class="space-y-3 text-xs font-mono">
                <div><span class="text-gray-400">Status</span><p id="statusTxt" class="text-emerald-400">Disconnected</p></div>
                <div><span class="text-gray-400">Account Address</span><p id="addressTxt" class="text-gray-500 break-all">--</p></div>
                <div class="flex justify-between">
                    <div><span class="text-gray-400">Chain ID</span><p id="chainIdTxt" class="text-cyan-400">--</p></div>
                    <div class="text-right"><span class="text-gray-400">USDC Balance</span><p id="balanceTxt" class="text-emerald-400">0.00 USDC</p></div>
                </div>
            </div>
        </div>

        <div class="bg-[#111622] border border-[#1f2636] rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-sm font-semibold text-gray-200">Talk to Agent</h2>
            <p class="text-[11px] text-gray-400">Give instructions to routing system:</p>
            <div id="chatLog" class="bg-[#080B11] border border-[#1f2636] rounded-xl p-3.5 font-mono text-[11px] min-h-[100px]">
                <p class="text-gray-500">Example: Send 2 USDC from Arc Testnet to Arbitrum Testnet 0x...</p>
            </div>
        </div>
    </div>

    <script>
        // Network Switch Logic
        document.getElementById('networkSwitcher').addEventListener('change', async (e) => {
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: e.target.value }] });
            } catch (err) { alert("Switch failed"); }
        });

        // Wallet Connection Logic
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('addressTxt').innerText = accounts[0];
                document.getElementById('statusTxt').innerText = "Connected";
            }
        });
    </script>
</body>
</html>
